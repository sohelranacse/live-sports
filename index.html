<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔴 Live TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { --primary: #ff4d4d; --bg: #0f0f0f; --panel: #1a1a1a; --text: #fff; --muted: #aaa; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    
    .container { 
      display: flex; 
      flex: 1; 
      overflow: hidden; 
      position: relative; 
    }
    
    /* Playlist Panel - Logo Only (Desktop) */
    .playlist {
      width: 100px;
      background: #181818;
      border-right: 1px solid #333;
      overflow-y: auto;
      padding: 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    
    /* Refresh Button */
    .refresh-btn {
      background: #252525; border: 1px solid #444; color: #fff;
      width: 70px; height: 70px; border-radius: 12px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; transition: all 0.2s; flex-shrink: 0;
      font-size: 0.7rem; padding: 8px 4px;
    }
    .refresh-btn:hover { background: var(--primary); border-color: var(--primary); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refresh-btn .icon { font-size: 1.3rem; line-height: 1; }
    
    /* Logo Items (Desktop: logo only) */
    .playlist-item {
      width: 70px; height: 70px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #252525;
      border: 2px solid transparent;
      padding: 4px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .playlist-item:hover { background: #333; transform: scale(1.05); border-color: #555; }
    .playlist-item.active {
      background: #2a1a1a;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary);
    }
    .playlist-item img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 6px; background: #000; display: block;
    }
    .playlist-item .ch-title {
      display: none; /* shown only in mobile drawer */
    }
    
    /* ========== PREMIUM VIDEO PLAYER DESIGN ========== */
    .player-area { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      background: #000; 
      position: relative; 
      min-width: 0;
      overflow: hidden;
    }
    
    .player-wrapper {
      position: relative; 
      width: 100%; 
      height: 100%; 
      background: #000;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer;
      box-shadow: inset 0 0 120px rgba(0,0,0,0.6);
    }
    #video { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      background: #000; 
      display: block;
    }

    /* Elegant placeholder */
    .video-placeholder { 
      position: absolute; 
      inset: 0;
      color: var(--muted); 
      text-align: center; 
      padding: 20px; 
      pointer-events: none; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.85) 100%);
    }
    .video-placeholder .spinner {
      width: 48px; height: 48px; 
      border: 3px solid #2a2a2a; 
      border-top-color: var(--primary);
      border-radius: 50%; 
      animation: spin 0.9s linear infinite; 
      margin-bottom: 18px;
    }
    .video-placeholder p {
      font-size: 1rem;
      letter-spacing: 0.3px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== PREMIUM TOP BAR (Channel Context + Menu) ===== */
    .player-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 10px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.35) 70%, transparent 100%);
      transition: opacity 0.25s ease, transform 0.2s ease;
      pointer-events: auto;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .topbar-right {
      display: flex;
      align-items: center;
    }

    /* Current Channel Display */
    .current-channel {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      max-width: 320px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 3px 4px 3px 3px;
      transition: background 0.2s;
    }
    .current-channel:hover {
      background: rgba(255,255,255,0.09);
    }
    .current-channel img {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      object-fit: cover;
      background: #111;
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      display: none; /* shown when channel active */
    }
    .current-channel span {
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 10px;
      color: #f0f0f0;
    }

    /* LIVE Badge */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 77, 77, 0.15);
      color: #ff6b6b;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 4px 10px 4px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255, 77, 77, 0.35);
      white-space: nowrap;
    }
    .live-badge .live-dot {
      width: 7px;
      height: 7px;
      background: #ff4d4d;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.35);
      animation: live-pulse 2s infinite ease-in-out;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    /* Menu Toggle - now inside topbar */
    .menu-toggle {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      width: 36px;
      height: 36px;
      border-radius: 999px;
      font-size: 1.15rem;
      display: none; /* shown only on mobile via media query */
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      margin-right: 2px;
    }
    .menu-toggle:hover { 
      background: rgba(255,255,255,0.15); 
      border-color: rgba(255,255,255,0.25);
    }
    .menu-toggle:active { transform: scale(0.92); }

    /* ===== PREMIUM BOTTOM CONTROLS ===== */
    .controls {
      position: absolute; 
      bottom: 0; 
      left: 0; 
      right: 0;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.55) 55%, transparent 100%);
      padding: 18px 18px 14px;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      gap: 12px;
      opacity: 0; 
      transition: opacity 0.28s cubic-bezier(0.23, 1, 0.32, 1); 
      pointer-events: none;
    }
    .player-wrapper:hover .controls,
    .controls.visible,
    .controls:focus-within { 
      opacity: 1; 
      pointer-events: auto; 
    }

    .controls-left,
    .controls-right,
    .controls-center {
      display: flex;
      align-items: center;
    }
    .controls-left { gap: 6px; }
    .controls-right { gap: 4px; }
    .controls-center {
      flex: 1;
      justify-content: center;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff; 
      font-size: 1.25rem;
      width: 42px; 
      height: 42px; 
      border-radius: 999px; 
      cursor: pointer;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover { 
      background: rgba(255,255,255,0.14); 
      border-color: rgba(255,255,255,0.25);
      transform: scale(1.04);
    }
    .ctrl-btn:active { transform: scale(0.94); }

    .ctrl-btn.mute::after { content: '🔊'; }
    .ctrl-btn.muted::after { content: '🔇'; }
    .ctrl-btn.play::after { content: '▶︎'; font-size: 1.05rem; }
    .ctrl-btn.pause::after { content: '⏸︎'; font-size: 1.05rem; }
    .ctrl-btn.fs::after { content: '⛶'; font-size: 1.15rem; }

    .volume-wrap { 
      display: flex; 
      align-items: center; 
      gap: 7px; 
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      padding: 0 6px 0 2px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .volume-slider { 
      width: 82px; 
      cursor: pointer; 
      accent-color: var(--primary);
      height: 3px;
    }

    /* Live indicator inside controls (shows when controls are visible) */
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ff6b6b;
      background: rgba(255,77,77,0.1);
      padding: 3px 11px 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255,77,77,0.25);
      white-space: nowrap;
    }
    .live-indicator .live-dot {
      width: 6px; 
      height: 6px;
      background: #ff4d4d;
      border-radius: 50%;
      animation: live-pulse 1.8s infinite ease-in-out;
      box-shadow: 0 0 0 2.5px rgba(255, 77, 77, 0.3);
    }

    /* Loading overlay - premium */
    .loading-overlay {
      position: absolute; 
      inset: 0; 
      background: rgba(0,0,0,0.82);
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-direction: column; 
      gap: 14px; 
      z-index: 30; 
      display: none;
      backdrop-filter: blur(4px);
    }
    .loading-overlay.show { display: flex; }
    .loading-overlay p {
      font-size: 0.95rem;
      color: #ccc;
    }

    /* Menu Overlay */
    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 150;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s;
      pointer-events: none;
    }
    .menu-open .menu-overlay {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    
    /* ========== MOBILE: Left Slide Menu + Premium Player Refinements ========== */
    @media (max-width: 768px) {
      /* Slide drawer */
      .playlist {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 260px;
        max-width: 78vw;
        z-index: 200;
        border-right: none;
        box-shadow: 4px 0 25px rgba(0, 0, 0, 0.6);
        transform: translateX(-100%);
        transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
        padding: 12px 8px;
        align-items: stretch;
        gap: 6px;
        flex: 0 0 0px !important;
      }
      .container.menu-open .playlist {
        transform: translateX(0);
      }

      /* Top bar optimized for mobile: more prominent channel info */
      .player-topbar {
        padding: 9px 10px 9px 8px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 65%, transparent 100%);
      }
      .current-channel {
        max-width: 58vw;
        padding: 2px 3px 2px 2px;
        gap: 7px;
      }
      .current-channel img {
        width: 26px;
        height: 26px;
        display: block;
      }
      .current-channel span {
        font-size: 0.82rem;
        padding-right: 6px;
      }
      .live-badge {
        font-size: 0.62rem;
        padding: 3px 8px 3px 5px;
        gap: 4px;
      }
      .live-badge .live-dot { width: 5.5px; height: 5.5px; }

      /* Menu toggle inside topbar */
      .menu-toggle {
        display: flex;
        width: 34px;
        height: 34px;
        font-size: 1.1rem;
      }

      /* Bottom controls - always a bit more visible on mobile + larger targets */
      .controls {
        padding: 14px 14px 12px;
        opacity: 0.92;
        background: linear-gradient(to top, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.65) 60%, transparent 100%);
      }
      .player-wrapper:hover .controls,
      .controls.visible {
        opacity: 1;
      }

      .ctrl-btn {
        width: 48px;
        height: 48px;
        font-size: 1.45rem;
        background: rgba(255,255,255,0.09);
        border-color: rgba(255,255,255,0.15);
      }
      .volume-wrap {
        padding: 0 5px 0 1px;
      }
      .volume-slider {
        width: 68px;
      }

      /* Hide the duplicate center LIVE indicator on mobile (topbar already shows it) */
      .controls-center {
        display: none;
      }

      /* Refresh button in drawer */
      .refresh-btn {
        width: calc(100% - 8px);
        height: 44px;
        flex-direction: row;
        font-size: 0.9rem;
        gap: 8px;
        padding: 0 12px;
        margin: 0 4px 4px;
        border-radius: 10px;
        justify-content: center;
      }
      .refresh-btn .icon { font-size: 1.1rem; }

      /* List rows in drawer */
      .playlist-item {
        width: 100%;
        height: auto;
        min-height: 52px;
        padding: 8px 10px;
        border-radius: 10px;
        flex-direction: row;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        border-width: 1.5px;
      }
      .playlist-item img {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
        border-radius: 6px;
      }
      .playlist-item .ch-title {
        display: block;
        font-size: 0.92rem;
        line-height: 1.25;
        color: #ddd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }
      .playlist-item.active .ch-title {
        color: #fff;
      }
      .playlist-item:hover {
        transform: none;
      }
    }

    /* Extra small phones */
    @media (max-width: 380px) {
      .playlist { width: 230px; }
      .playlist-item img { width: 38px; height: 38px; }
      .playlist-item .ch-title { font-size: 0.85rem; }
      .current-channel { max-width: 52vw; }
      .current-channel span { font-size: 0.78rem; }
    }

    /* Desktop refinements for the new player */
    @media (min-width: 769px) {
      .player-topbar {
        opacity: 0.88;
      }
      .player-wrapper:hover .player-topbar {
        opacity: 1;
      }
      .current-channel img {
        display: block;
      }
      .controls {
        padding: 20px 22px 16px;
      }
      .ctrl-btn {
        width: 40px;
        height: 40px;
      }
      .volume-slider {
        width: 92px;
      }
      .live-badge {
        font-size: 0.68rem;
      }
      /* On desktop the center live indicator is useful */
      .controls-center {
        display: flex;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="playlist">
    <button class="refresh-btn" id="refreshBtn" title="Refresh Streams">
      <span class="icon">⟳</span><span>Refresh</span>
    </button>
    <div id="playlistItems"></div>
  </div>
  
  <div class="player-area">
    <div class="player-wrapper" id="playerWrapper">
      <!-- Premium Top Bar -->
      <div class="player-topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Open channels menu">☰</button>
          <div class="current-channel" id="currentChannel">
            <img id="currentLogo" alt="Channel logo">
            <span id="currentTitle">Select a channel</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="live-badge" id="liveBadge">
            <span class="live-dot"></span>
            <span>LIVE</span>
          </div>
        </div>
      </div>

      <video id="video" playsinline preload="metadata"></video>

      <div class="video-placeholder" id="placeholder">
        <div class="spinner"></div>
        <p>Select a channel to start watching</p>
      </div>

      <!-- Premium Bottom Controls -->
      <div class="controls">
        <div class="controls-left">
          <button class="ctrl-btn play" id="playBtn" title="Play/Pause"></button>
          <div class="volume-wrap">
            <button class="ctrl-btn mute" id="muteBtn" title="Mute/Unmute"></button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
          </div>
        </div>

        <div class="controls-center">
          <div class="live-indicator">
            <span class="live-dot"></span>
            <span>LIVE</span>
          </div>
        </div>

        <div class="controls-right">
          <button class="ctrl-btn fs" id="fsBtn" title="Fullscreen"></button>
        </div>
      </div>

      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Loading...</p>
      </div>
    </div>
  </div>

  <div class="menu-overlay" id="menuOverlay"></div>
</div>

<script>
const M3U_URL = 'https://raw.githubusercontent.com/munim-sah75/Cofs_TV/refs/heads/main/fancode.m3u';
const AUTO_REFRESH_MS = 5 * 60 * 1000;

let channels = [], hls = null, activeIndex = -1, refreshTimer = null;

const video = document.getElementById('video');
const playlistItems = document.getElementById('playlistItems');
const placeholder = document.getElementById('placeholder');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingText = document.getElementById('loadingText');
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
const fsBtn = document.getElementById('fsBtn');
const volumeSlider = document.getElementById('volumeSlider');
const playerWrapper = document.getElementById('playerWrapper');
const refreshBtn = document.getElementById('refreshBtn');
const menuToggle = document.getElementById('menuToggle');
const menuOverlay = document.getElementById('menuOverlay');
const container = document.querySelector('.container');

// New premium player UI elements
const currentChannelEl = document.getElementById('currentChannel');
const currentLogo = document.getElementById('currentLogo');
const currentTitle = document.getElementById('currentTitle');
const liveBadge = document.getElementById('liveBadge');

function parseM3U(content) {
  const lines = content.split('\n').map(l => l.trim()).filter(l => l);
  const result = []; let current = null;
  for (const line of lines) {
    if (line.startsWith('#EXTINF:')) {
      current = { title: '', logo: '', url: '' };
      const logoMatch = line.match(/tvg-logo="([^"]+)"/); if (logoMatch) current.logo = logoMatch[1];
      const titleMatch = line.match(/,\s*(.+)$/); if (titleMatch) current.title = titleMatch[1].trim();
    } else if (current && !line.startsWith('#') && line.includes('.m3u8')) {
      current.url = line; result.push({...current}); current = null;
    }
  }
  return result;
}

async function fetchPlaylist() {
  showLoading('Fetching...'); refreshBtn.disabled = true;
  try {
    const res = await fetch(M3U_URL);
    if (!res.ok) throw new Error('Failed');
    channels = parseM3U(await res.text());
    if (!channels.length) throw new Error('No streams');
    renderPlaylist(); hideLoading();
    if (activeIndex === -1) loadStream(0);
  } catch (e) { showError('Click ⟳ to retry'); console.error(e); }
  finally { refreshBtn.disabled = false; }
}

function renderPlaylist() {
  playlistItems.innerHTML = '';
  const fallback = `image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70"><rect fill="%23222" width="70" height="70"/><text fill="%23666" x="50%" y="50%" font-size="10" text-anchor="middle" dominant-baseline="middle">LIVE</text></svg>`;
  channels.forEach((ch, i) => {
    const el = document.createElement('div');
    el.className = 'playlist-item' + (i === activeIndex ? ' active' : '');
    el.title = ch.title;
    el.innerHTML = `<img src="${ch.logo || fallback}"><span class="ch-title">${ch.title}</span>`;
    el.onclick = () => loadStream(i);
    playlistItems.appendChild(el);
  });
}

function loadStream(i) {
  if (i < 0 || i >= channels.length || (activeIndex === i && !video.error)) return;
  activeIndex = i;
  const channel = channels[i];
  
  document.querySelectorAll('.playlist-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
  placeholder.style.display = 'none'; 
  showLoading(`Connecting to ${channel.title || 'stream'}...`);
  updatePlayerHeader(channel);
  closeMenuIfMobile();
  toggleMobileControls(false); // hide controls while loading new stream

  if (hls) { hls.destroy(); hls = null; } video.src = '';
  
  setTimeout(() => {
    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, lowLatencyMode: true });
      hls.loadSource(channels[i].url); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { hideLoading(); video.play().catch(()=>{}); });
      hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) { hideLoading(); showError('Stream error'); setTimeout(()=>loadStream(i+1), 2500); } });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = channels[i].url;
      video.onloadedmetadata = () => { hideLoading(); video.play().catch(()=>{}); };
      video.onerror = () => { hideLoading(); showError('Stream error'); };
    } else { hideLoading(); placeholder.innerHTML = '<p>❌ HLS not supported</p>'; placeholder.style.display = 'block'; }
  }, 50);
}

function updatePlayBtn() { playBtn.classList.toggle('pause', !video.paused); playBtn.classList.toggle('play', video.paused); }
playBtn.onclick = () => { video.paused ? video.play() : video.pause(); };
video.onplay = updatePlayBtn; 
video.onpause = updatePlayBtn;

// On successful playback start, briefly reveal controls on mobile (great UX)
video.onplaying = () => {
  updatePlayBtn();
  if (window.innerWidth <= 768) {
    toggleMobileControls(true);
    clearTimeout(mobileControlsTimeout);
    mobileControlsTimeout = setTimeout(() => toggleMobileControls(false), 2600);
  }
};

muteBtn.onclick = toggleMute;
volumeSlider.oninput = (e) => { video.volume = parseFloat(e.target.value); video.muted = !video.volume; muteBtn.classList.toggle('muted', video.muted); };

fsBtn.onclick = () => { document.fullscreenElement ? document.exitFullscreen() : playerWrapper.requestFullscreen?.(); };

// Refined video area interaction:
// - Desktop: click safe area → toggle mute (existing behavior)
// - Mobile: click safe area → toggle bottom controls visibility (premium mobile pattern)
let mobileControlsTimeout = null;

playerWrapper.addEventListener('click', (e) => {
  if (e.target.closest('.controls') || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;

  if (window.innerWidth <= 768) {
    // Mobile: show/hide controls
    toggleMobileControls();
    // Auto hide after 3.5s of inactivity
    clearTimeout(mobileControlsTimeout);
    if (document.querySelector('.controls')?.classList.contains('visible')) {
      mobileControlsTimeout = setTimeout(() => toggleMobileControls(false), 3500);
    }
  } else {
    toggleMute();
  }
});

// Also tap topbar channel area to show controls on mobile
if (currentChannelEl) {
  currentChannelEl.addEventListener('click', (e) => {
    if (window.innerWidth <= 768) {
      e.stopPropagation();
      toggleMobileControls(true);
      clearTimeout(mobileControlsTimeout);
      mobileControlsTimeout = setTimeout(() => toggleMobileControls(false), 4200);
    }
  });
}

function toggleMute() {
  video.muted = !video.muted;
  muteBtn.classList.toggle('muted', video.muted);
  volumeSlider.value = video.muted ? 0 : video.volume;
}

// ❌ ট্যাব inactive হলে আর পজ/মিউট হবে না (রিমুভ করা হয়েছে)

function showLoading(t) { 
  loadingText.textContent = t; 
  loadingOverlay.classList.add('show'); 
}
function hideLoading() { 
  loadingOverlay.classList.remove('show'); 
}

// Set initial empty state for premium header
function resetPlayerHeader() {
  updatePlayerHeader(null);
}
function showError(m) { hideLoading(); placeholder.innerHTML = `<p>${m}</p>`; placeholder.style.display = 'block'; }

/* ===== Premium Player Header & State ===== */
function updatePlayerHeader(channel) {
  if (!channel) {
    // No channel selected
    currentTitle.textContent = 'Select a channel';
    currentLogo.style.display = 'none';
    liveBadge.style.display = 'none';
    currentChannelEl.style.display = 'flex';
    return;
  }
  currentTitle.textContent = channel.title || 'Live Channel';
  if (channel.logo) {
    currentLogo.src = channel.logo;
    currentLogo.style.display = 'block';
  } else {
    currentLogo.style.display = 'none';
  }
  liveBadge.style.display = 'flex';
  currentChannelEl.style.display = 'flex';
}

/* Mobile: tap on video area toggles bottom controls visibility */
let controlsVisible = false;
function toggleMobileControls(force) {
  if (window.innerWidth > 768) return;
  controlsVisible = (typeof force === 'boolean') ? force : !controlsVisible;
  const controls = document.querySelector('.controls');
  if (controls) {
    controls.classList.toggle('visible', controlsVisible);
  }
}

function toggleMenu() {
  if (!container) return;
  const isOpen = container.classList.toggle('menu-open');
  menuToggle.setAttribute('aria-label', isOpen ? 'Close channels menu' : 'Open channels menu');
  menuToggle.textContent = isOpen ? '✕' : '☰';
}

function closeMenu() {
  if (!container) return;
  container.classList.remove('menu-open');
  if (menuToggle) {
    menuToggle.setAttribute('aria-label', 'Open channels menu');
    menuToggle.textContent = '☰';
  }
}

function closeMenuIfMobile() {
  if (window.innerWidth <= 768) closeMenu();
}

// Close on overlay tap
if (menuOverlay) menuOverlay.onclick = closeMenu;

// Toggle from hamburger
if (menuToggle) menuToggle.onclick = toggleMenu;

// Close drawer with Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && container && container.classList.contains('menu-open')) {
    closeMenu();
  }
});

// Auto-close slide menu when resizing to desktop
window.addEventListener('resize', () => {
  if (window.innerWidth > 768 && container && container.classList.contains('menu-open')) {
    closeMenu();
  }
});

function startAutoRefresh() { if (refreshTimer) clearInterval(refreshTimer); refreshTimer = setInterval(fetchPlaylist, AUTO_REFRESH_MS); }

async function init() {
  video.volume = 1;
  resetPlayerHeader();           // show clean "Select a channel" state
  await fetchPlaylist(); 
  startAutoRefresh();
  refreshBtn.onclick = fetchPlaylist;
}
init();
</script>
</body>
</html>
